<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaultly — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('vaultly-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));</script>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand"><div class="brand-mark">V</div>Vaultly</div>
    <h1>Set a new password</h1>
    <p class="sub">Choose a new password for your vault</p>

    <div class="field">
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="At least 6 characters">
    </div>
    <div class="field">
      <label>Confirm New Password</label>
      <input type="password" id="confirmNewPassword" placeholder="Re-enter new password">
    </div>
    <div class="error-text" id="errorText"></div>

    <button class="btn-primary" style="width:100%;" id="submitBtn" onclick="handleReset()">Update Password</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script>
async function handleReset(){
  const newPassword = document.getElementById('newPassword').value;
  const confirmNewPassword = document.getElementById('confirmNewPassword').value;
  const errorText = document.getElementById('errorText');
  const btn = document.getElementById('submitBtn');
  errorText.style.color = '';
  errorText.textContent = '';

  if(!newPassword || newPassword.length < 6){
    errorText.textContent = 'Password must be at least 6 characters.';
    return;
  }
  if(newPassword !== confirmNewPassword){
    errorText.textContent = 'Passwords do not match.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Updating...';

  try{
    const { error } = await sb.auth.updateUser({ password: newPassword });
    if(error) throw error;
    errorText.style.color = '#059669';
    errorText.textContent = 'Password updated! Redirecting to login...';
    setTimeout(()=>{ window.location.href = 'login.html'; }, 1800);
  }catch(e){
    errorText.textContent = e.message || 'Could not update password. The reset link may have expired — request a new one from the login page.';
    btn.disabled = false;
    btn.textContent = 'Update Password';
  }
}
</script>
</body>
</html>
