<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaultly — Log In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('vaultly-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));</script>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand"><div class="brand-mark">V</div>Vaultly</div>
    <h1 id="formTitle">Welcome back</h1>
    <p class="sub" id="formSub">Log in to access your vault</p>

    <div id="signupExtra" style="display:none;">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Your full name">
      </div>
      <div class="field">
        <label>Date of Birth</label>
        <input type="date" id="dob">
      </div>
      <div class="field">
        <label>ID Card Number</label>
        <input type="text" id="idCardNumber" placeholder="e.g. CNIC number">
      </div>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 6 characters">
    </div>
    <div class="field" id="confirmPasswordField" style="display:none;">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Re-enter your password">
    </div>
    <div class="error-text" id="errorText"></div>

    <button class="btn-primary" style="width:100%;" id="submitBtn" onclick="handleSubmit()">Log In</button>

    <div class="auth-switch">
      <span id="switchText">Don't have an account?</span>
      <button onclick="toggleMode()" id="switchBtn">Sign up</button>
    </div>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script>
let isSignup = false;

function toggleMode(){
  isSignup = !isSignup;
  document.getElementById('formTitle').textContent = isSignup ? 'Create your vault' : 'Welcome back';
  document.getElementById('formSub').textContent = isSignup ? 'Set up your personal account' : 'Log in to access your vault';
  document.getElementById('submitBtn').textContent = isSignup ? 'Sign Up' : 'Log In';
  document.getElementById('switchText').textContent = isSignup ? 'Already have an account?' : "Don't have an account?";
  document.getElementById('switchBtn').textContent = isSignup ? 'Log in' : 'Sign up';
  document.getElementById('signupExtra').style.display = isSignup ? 'block' : 'none';
  document.getElementById('confirmPasswordField').style.display = isSignup ? 'block' : 'none';
  document.getElementById('errorText').textContent = '';
}

async function handleSubmit(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorText = document.getElementById('errorText');
  const btn = document.getElementById('submitBtn');
  errorText.style.color = '';
  errorText.textContent = '';

  if(!email || !password){
    errorText.textContent = 'Please fill in both fields.';
    return;
  }

  let fullName, dob, idCardNumber;
  if(isSignup){
    fullName = document.getElementById('fullName').value.trim();
    dob = document.getElementById('dob').value;
    idCardNumber = document.getElementById('idCardNumber').value.trim();
    const confirmPassword = document.getElementById('confirmPassword').value;

    if(!fullName || !dob || !idCardNumber){
      errorText.textContent = 'Please fill in Name, Date of Birth, and ID Card Number.';
      return;
    }
    if(password !== confirmPassword){
      errorText.textContent = 'Passwords do not match.';
      return;
    }
  }

  btn.disabled = true;
  btn.textContent = 'Please wait...';

  try{
    if(isSignup){
      const { data, error } = await sb.auth.signUp({ email, password });
      if(error) throw error;

      // Save the extra profile details (safe to attempt even if email confirmation is pending)
      if(data.user){
        await sb.from('profiles').upsert({
          id: data.user.id,
          full_name: fullName,
          date_of_birth: dob,
          id_card_number: idCardNumber,
          email: email
        });
      }

      if(data.session){
        window.location.href = 'index.html';
      }else{
        errorText.style.color = '#059669';
        errorText.textContent = 'Account created! Please check your email to confirm, then log in.';
        btn.disabled = false;
        btn.textContent = 'Sign Up';
        toggleMode();
      }
    }else{
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if(error) throw error;
      window.location.href = 'index.html';
    }
  }catch(e){
    errorText.style.color = '';
    errorText.textContent = e.message || 'Something went wrong. Please try again.';
    btn.disabled = false;
    btn.textContent = isSignup ? 'Sign Up' : 'Log In';
  }
}

// If already logged in, skip straight to the vault
(async function checkSession(){
  const { data: { session } } = await sb.auth.getSession();
  if(session) window.location.href = 'index.html';
})();

document.getElementById('password').addEventListener('keydown', e=>{
  if(e.key === 'Enter') handleSubmit();
});
</script>
</body>
  </html>
